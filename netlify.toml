[build]
  command = "npm run build"
  publish = "dist"
  # After you deploy my-agent-next (e.g. Vercel), add this in Netlify → Site configuration → Environment variables:
  # CHAT_EMBED_URL = https://<your-next-app-host>/chat
  # Redeploy the dashboard so dist/index.html gets the correct iframe URL.

# SPA: serve index.html for client-side routes (OAuth return, deep links)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
